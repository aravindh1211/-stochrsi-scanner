name: StochRSI Weekly Scanner

on:
  schedule:
    # Every Friday at 14:30 UTC = 8:00 PM IST
    # (NSE closes 3:30 PM IST, US pre-market opens ~7 PM IST — good weekly close window)
    - cron: "30 14 * * 5"

  # Manual trigger from Actions tab — runs immediately regardless of day
  workflow_dispatch:
    inputs:
      threshold:
        description: "Stoch RSI K threshold (default: 20)"
        required: false
        default: "20"

permissions:
  contents: write   # needed so the workflow can commit the monthly state file back

jobs:
  scan:
    name: Run StochRSI Weekly Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCH_RSI_THRESHOLD: ${{ github.event.inputs.threshold || vars.STOCH_RSI_THRESHOLD || '20' }}
        run: python src/scanner.py

      - name: Persist monthly watchlist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/monthly_state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update monthly watchlist state [skip ci]"
            git push
          fi
