name: Update Holdings

# Easy way to update your holdings list: go to the Actions tab, click
# "Update Holdings" -> "Run workflow", paste tickers into whichever
# category changed, and run. It edits holdings.json and commits the
# change for you — no need to open a code editor.
#
# Notes:
#  - Tickers are comma-separated, e.g.  HDFCBANK.NS, TATAMOTORS.NS
#  - Prefix a ticker with "-" to remove it, e.g. "-IRFC.NS"
#  - Leave a field blank to leave that category untouched
#  - Set mode to "replace" to overwrite a category outright instead of
#    adding/removing from the existing list

on:
  workflow_dispatch:
    inputs:
      nse_stocks:
        description: "NSE stocks to add/remove (comma-separated, prefix with - to remove)"
        required: false
        default: ""
      us_stocks:
        description: "US stocks/ETFs to add/remove (comma-separated, prefix with - to remove)"
        required: false
        default: ""
      crypto:
        description: "CoinGecko crypto IDs to add/remove (comma-separated, prefix with - to remove)"
        required: false
        default: ""
      mode:
        description: "add (default, merges with existing list) or replace (overwrites the category)"
        required: false
        default: "add"

permissions:
  contents: write

jobs:
  update:
    name: Update holdings.json
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply holdings changes
        env:
          NSE_STOCKS: ${{ github.event.inputs.nse_stocks }}
          US_STOCKS: ${{ github.event.inputs.us_stocks }}
          CRYPTO: ${{ github.event.inputs.crypto }}
          MODE: ${{ github.event.inputs.mode }}
        run: python scripts/update_holdings.py

      - name: Commit updated holdings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add holdings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update holdings via Update Holdings workflow"
            git push
          fi
